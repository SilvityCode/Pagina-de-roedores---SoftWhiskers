<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Adopción</title>
  <link rel="stylesheet" href="/assets/css/adopcion.css">
</head>

<body class="adopcion">
  <div class="card-adopcion">

    <header>
      <h1>Zona de adopción</h1>
      <p id="bienvenida"></p>
    </header>

    <main>
      <div class="categorias">
        <button onclick="toggle('hamster')">HAMSTERS</button>
        <button onclick="toggle('cobaya')">COBAYAS</button>
        <button onclick="toggle('conejo')">CONEJOS</button>
        <button onclick="toggle('jerbo')">JERBOS</button>
        <button onclick="toggle('rata')">RATAS DOMESTICAS</button>
        <button onclick="toggle('chinchilla')">CHINCHILLAS</button>
      </div>

      <div id="mensaje" class="mensaje oculto"></div>

      <div id="hamster" class="contenedor oculto"></div>
      <div id="cobaya"  class="contenedor oculto"></div>
      <div id="conejo"  class="contenedor oculto"></div>
      <div id="jerbo"  class="contenedor oculto"></div>
      <div id="rata"  class="contenedor oculto"></div>
      <div id="chinchilla"  class="contenedor oculto"></div>
    </main>

    <footer>
      <button id="logout" class="btn">Cerrar sesión</button>
    </footer>

  </div>

  <script src="/assets/js/adopcion.js"></script>
</body>
</html>
